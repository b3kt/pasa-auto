<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:*">
  <title>PasaAuto - Server Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #16213e;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #0f3460;
    }

    .header h1 { font-size: 18px; color: #e94560; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .status-badge.running   { background: #1b5e20; color: #4caf50; }
    .status-badge.stopped   { background: #b71c1c; color: #ef5350; }
    .status-badge.starting  { background: #e65100; color: #ff9800; }
    .status-badge.unhealthy { background: #f57f17; color: #ffeb3b; }
    .status-badge.error     { background: #4a148c; color: #ce93d8; }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-badge.running .status-dot { animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .controls {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }

    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start   { background: #2e7d32; color: white; }
    .btn-start:hover:not(:disabled)   { background: #388e3c; }
    .btn-stop    { background: #c62828; color: white; }
    .btn-stop:hover:not(:disabled)    { background: #d32f2f; }
    .btn-restart { background: #1565c0; color: white; }
    .btn-restart:hover:not(:disabled) { background: #1976d2; }
    .btn-clear   { background: transparent; color: #888; border: 1px solid #444; }
    .btn-clear:hover { background: #333; color: #fff; }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 16px 20px;
      background: #0f0f23;
    }

    .info-item {
      background: #16213e;
      padding: 12px;
      border-radius: 8px;
    }

    .info-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 14px;
      color: #fff;
      font-family: monospace;
      word-break: break-all;
    }

    .logs-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .logs-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }

    .logs-header h2 { font-size: 14px; color: #888; }

    .logs {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: #0d0d1a;
      font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.6;
    }

    .log-entry {
      padding: 3px 8px;
      border-radius: 4px;
      margin-bottom: 2px;
      word-break: break-word;
    }

    .log-entry:hover { background: #1a1a2e; }

    .log-time  { color: #666; margin-right: 8px; }
    .log-info  { color: #4fc3f7; }
    .log-warn  { color: #ffb74d; }
    .log-error { color: #ef5350; }
    .log-debug { color: #9e9e9e; }
  </style>
</head>
<body>
  <div class="header">
    <h1>PasaAuto Server Manager</h1>
    <div id="statusBadge" class="status-badge stopped">
      <span class="status-dot"></span>
      <span id="statusText">STOPPED</span>
    </div>
  </div>

  <div class="controls">
    <button id="btnStart"   class="btn btn-start"   onclick="startServer()">Start Server</button>
    <button id="btnStop"    class="btn btn-stop"    onclick="stopServer()"    disabled>Stop Server</button>
    <button id="btnRestart" class="btn btn-restart" onclick="restartServer()" disabled>Restart</button>
  </div>

  <div class="info-grid">
    <div class="info-item">
      <div class="info-label">Backend URL</div>
      <div id="serverUrl" class="info-value">-</div>
    </div>
    <div class="info-item">
      <div class="info-label">Process ID</div>
      <div id="processId" class="info-value">-</div>
    </div>
    <div class="info-item">
      <div class="info-label">Uptime</div>
      <div id="uptime" class="info-value">-</div>
    </div>
    <div class="info-item">
      <div class="info-label">Health</div>
      <div id="healthStatus" class="info-value">-</div>
    </div>
  </div>

  <div class="logs-container">
    <div class="logs-header">
      <h2>Server Logs</h2>
      <button class="btn btn-clear" onclick="clearLogs()">Clear</button>
    </div>
    <div id="logs" class="logs"></div>
  </div>

  <script>
    let startTime = null;
    let uptimeInterval = null;

    function formatUptime(ms) {
      if (!ms) return '-';
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const h = Math.floor(m / 60);
      if (h > 0) return `${h}h ${m % 60}m`;
      if (m > 0) return `${m}m ${s % 60}s`;
      return `${s}s`;
    }

    function formatTime(isoString) {
      return new Date(isoString).toLocaleTimeString();
    }

    function updateStatus(status) {
      const badge    = document.getElementById('statusBadge');
      const btnStart   = document.getElementById('btnStart');
      const btnStop    = document.getElementById('btnStop');
      const btnRestart = document.getElementById('btnRestart');

      badge.className = `status-badge ${status.status}`;
      document.getElementById('statusText').textContent = status.status.toUpperCase();

      const isRunning  = status.status === 'running';
      const isStarting = status.status === 'starting';

      btnStart.disabled   = isRunning || isStarting;
      btnStop.disabled    = !isRunning && !isStarting;
      btnRestart.disabled = !isRunning && !isStarting;

      document.getElementById('serverUrl').textContent  = status.url || '-';
      document.getElementById('processId').textContent  = status.processId || '-';
      document.getElementById('healthStatus').textContent = isRunning ? 'OK' : status.status;

      if (uptimeInterval) { clearInterval(uptimeInterval); uptimeInterval = null; }

      if (status.uptime && (isRunning || isStarting)) {
        startTime = Date.now() - status.uptime;
        updateUptime();
        uptimeInterval = setInterval(updateUptime, 1000);
      } else {
        document.getElementById('uptime').textContent = '-';
        startTime = null;
      }
    }

    function updateUptime() {
      if (!startTime) return;
      document.getElementById('uptime').textContent = formatUptime(Date.now() - startTime);
    }

    function addLog(entry) {
      const container = document.getElementById('logs');
      const div = document.createElement('div');
      div.className = `log-entry log-${entry.level}`;
      div.innerHTML = `<span class="log-time">${formatTime(entry.timestamp)}</span>${escapeHtml(entry.message)}`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    async function refreshStatus() {
      const status = await window.electronAPI.getServerStatus();
      updateStatus(status);
    }

    async function loadLogs() {
      const logs = await window.electronAPI.getLogs();
      const container = document.getElementById('logs');
      container.innerHTML = '';
      logs.forEach(addLog);
    }

    async function startServer() {
      await window.electronAPI.startServer();
    }

    async function stopServer() {
      await window.electronAPI.stopServer();
    }

    async function restartServer() {
      await window.electronAPI.restartServer();
    }

    async function clearLogs() {
      await window.electronAPI.clearLogs();
      document.getElementById('logs').innerHTML = '';
    }

    window.electronAPI.onServerStatus(updateStatus);
    window.electronAPI.onLogEntry(addLog);

    // Initial load
    refreshStatus();
    loadLogs();
  </script>
</body>
</html>
