name: Build Quarkus Native Image (Linux & Windows) and Release

on:
  workflow_dispatch:
  push:
    branches:
      - feature/electron
      - releases/electron

jobs:
  native-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: 25
          components: native-image
          cache: maven

      - name: Verify GraalVM
        run: |
          java -version
          native-image --version
          mvn -version

      - name: Build Quarkus Native Image (Linux, backend only)
        env:
          GRAALVM_HOME: ${{ env.JAVA_HOME }}
        run: |
          mvn clean package -Pnative -Dnative -DskipTests

      - name: Upload Native Binary runner
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-native-linux
          path: target/*-runner

  native-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: 25
          components: native-image
          cache: maven

      - name: Verify GraalVM
        run: |
          java -version
          native-image --version
          mvn -version

      - name: Build Quarkus Native Image (Windows, backend only)
        env:
          GRAALVM_HOME: ${{ env.JAVA_HOME }}
        run: |
          mvn clean package -Pnative -Dnative -DskipTests

      - name: Prepare binary for upload
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path temp-bin | Out-Null
          $runnerExe = Get-ChildItem target/*-runner.exe | Select-Object -First 1
          if ($runnerExe) {
            Copy-Item -Path $runnerExe.FullName -Destination temp-bin/pasa-auto-runner.exe
            Write-Host "Prepared binary: $($runnerExe.Name) -> temp-bin/pasa-auto-runner.exe"
          } else {
            Write-Error "No runner.exe found in target/"
            exit 1
          }

      - name: Upload Native Binary runner
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-native-windows
          path: temp-bin/pasa-auto-runner.exe

  electron-windows:
    needs: native-windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Download Quarkus Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: quarkus-native-windows
          path: electron/bin/

      - name: Prepare binary for Electron
        shell: pwsh
        run: |
          # List downloaded files
          Write-Host "Downloaded contents:"
          Get-ChildItem electron/bin/ -Recurse | ForEach-Object { Write-Host $_.FullName }
          
          # Rename binary to pasa-auto-runner.exe
          $runnerExe = Get-ChildItem electron/bin/*-runner.exe | Select-Object -First 1
          if ($runnerExe) {
            Move-Item -Path $runnerExe.FullName -Destination "electron/bin/pasa-auto-runner.exe" -Force
            Write-Host "Renamed $($runnerExe.Name) to pasa-auto-runner.exe"
          } else {
            # Check if already named correctly
            if (Test-Path "electron/bin/pasa-auto-runner.exe") {
              Write-Host "pasa-auto-runner.exe already exists"
            } else {
              Write-Error "No runner.exe found in electron/bin/"
              exit 1
            }
          }
          
          # Verify
          if (Test-Path "electron/bin/pasa-auto-runner.exe") {
            Write-Host "SUCCESS: Binary ready at electron/bin/pasa-auto-runner.exe"
          } else {
            Write-Error "FAILED: Binary not found"
            exit 1
          }

      - name: Install dependencies
        working-directory: electron
        shell: pwsh
        run: |
          npm install

      - name: Build Electron App (Windows)
        working-directory: electron
        shell: pwsh
        run: |
          Write-Host "Building Electron app for Windows..."
          npm run dist:windows
          
          Write-Host "Build output:"
          Get-ChildItem dist/ | ForEach-Object { Write-Host $_.FullName }

      - name: Upload Electron Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: electron-windows
          path: |
            electron/dist/*.exe
            electron/dist/**/*.exe

  release:
    needs: [native-windows, electron-windows]
#    needs: [native-linux, native-windows, tauri-linux, tauri-windows, electron-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Get current version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Update to next development version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))-SNAPSHOT"
          echo "Updating to next development version: $NEXT_VERSION"
          mvn version:set -DnewVersion=$NEXT_VERSION -q

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore: bump to next development version"
          git push

      - name: Create Git Tag
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
