name: Build Quarkus Native Image (Linux & Windows) and Release

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  native-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: 25
          components: native-image
          cache: maven

      - name: Verify GraalVM
        run: |
          java -version
          native-image --version
          mvn -version

      - name: Build Quarkus Native Image (Linux, backend only)
        env:
          GRAALVM_HOME: ${{ env.JAVA_HOME }}
        run: |
          mvn clean package -Pnative -Dnative -DskipTests

      - name: Upload Native Binary runner
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-native-linux
          path: target/*-runner

  native-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: 25
          components: native-image
          cache: maven

      - name: Verify GraalVM
        run: |
          java -version
          native-image --version
          mvn -version

      - name: Build Quarkus Native Image (Windows, backend only)
        env:
          GRAALVM_HOME: ${{ env.JAVA_HOME }}
        run: |
          mvn clean package -Pnative -Dnative -DskipTests

      - name: Prepare binary for upload
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path temp-bin | Out-Null
          $runnerExe = Get-ChildItem target/*-runner.exe | Select-Object -First 1
          if ($runnerExe) {
            Copy-Item -Path $runnerExe.FullName -Destination temp-bin/pasa-auto-runner.exe
            Write-Host "Prepared binary: $($runnerExe.Name) -> temp-bin/pasa-auto-runner.exe"
          } else {
            Write-Error "No runner.exe found in target/"
            exit 1
          }

      - name: Upload Native Binary runner
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-native-windows
          path: temp-bin/pasa-auto-runner.exe

  electron-windows:
    needs: native-windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Download Quarkus Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: quarkus-native-windows
          path: electron/bin/

      - name: Prepare binary for Electron
        shell: pwsh
        run: |
          # List downloaded files
          Write-Host "Downloaded contents:"
          Get-ChildItem electron/bin/ -Recurse | ForEach-Object { Write-Host $_.FullName }
          
          # Rename binary to pasa-auto-runner.exe
          $runnerExe = Get-ChildItem electron/bin/*-runner.exe | Select-Object -First 1
          if ($runnerExe) {
            Move-Item -Path $runnerExe.FullName -Destination "electron/bin/pasa-auto-runner.exe" -Force
            Write-Host "Renamed $($runnerExe.Name) to pasa-auto-runner.exe"
          } else {
            # Check if already named correctly
            if (Test-Path "electron/bin/pasa-auto-runner.exe") {
              Write-Host "pasa-auto-runner.exe already exists"
            } else {
              Write-Error "No runner.exe found in electron/bin/"
              exit 1
            }
          }
          
          # Verify
          if (Test-Path "electron/bin/pasa-auto-runner.exe") {
            Write-Host "SUCCESS: Binary ready at electron/bin/pasa-auto-runner.exe"
          } else {
            Write-Error "FAILED: Binary not found"
            exit 1
          }

      - name: Install dependencies
        working-directory: electron
        shell: pwsh
        run: |
          npm install

      - name: Build Electron App (Windows)
        working-directory: electron
        shell: pwsh
        run: |
          Write-Host "Building Electron app for Windows..."
          npm run dist:windows
          
          Write-Host "Build output:"
          Get-ChildItem dist/ | ForEach-Object { Write-Host $_.FullName }

      - name: Upload Electron Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: electron-windows
          path: |
            electron/dist/*.exe
            electron/dist/**/*.exe

  release:
    needs: [native-windows, electron-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download Native Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: native-windows
          path: artifacts/native-windows

      - name: Download Electron Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: electron-windows
          path: artifacts/electron-windows

      - name: Get current version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Make release script executable
        run: chmod +x release.sh

      - name: Run Release Script
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "Running release for version $VERSION"
          ./release.sh --dry-run $VERSION
          ./release.sh $VERSION

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## Release v${{ steps.version.outputs.version }}
            
            ### 🚀 Features
            - Automated release with native binaries
            
            ### 📦 Downloads
            - **Native Binary**: Quarkus native executable for Windows
            - **Electron App**: Desktop application with manager interface
            
            ### 🔧 Installation
            1. Download the native binary for your platform
            2. Extract and run the executable
            3. For the desktop app, download the Electron installer
            
            ### 📋 Changes
            - Full release automation
            - Enhanced manager interface with tabbed navigation
            - Configurable backend settings
            - Environment variables integration with .env file
            
            ---
            Built with ❤️ using Quarkus and Electron
          files: |
            artifacts/native-windows/*-runner.exe
            artifacts/electron-windows/*.exe
            artifacts/electron-windows/**/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
