  tauri-windows:
    needs: native-windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tauri/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download Quarkus Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: quarkus-native-windows
          path: downloaded-bin/

      - name: Prepare binary for Tauri
        shell: pwsh
        run: |
          # Debug: List what was downloaded
          Write-Host "Downloaded contents:"
          Get-ChildItem downloaded-bin/ -Recurse | ForEach-Object { Write-Host $_.FullName }
          
          # Create tauri/bin directory
          New-Item -ItemType Directory -Force -Path tauri/bin | Out-Null
          
          # Find the downloaded exe
          $downloadedExe = Get-ChildItem downloaded-bin/ -Filter *.exe -Recurse | Select-Object -First 1
          
          if (-not $downloadedExe) {
            Write-Error "No exe file found in downloaded-bin/"
            exit 1
          }
          
          Write-Host "Found exe: $($downloadedExe.FullName)"
          
          # Tauri v2 expects: pasa-auto-runner-x86_64-pc-windows-msvc.exe
          $targetTriple = "x86_64-pc-windows-msvc"
          $destinationPath = "tauri/bin/pasa-auto-runner-$targetTriple.exe"
          
          Copy-Item -Path $downloadedExe.FullName -Destination $destinationPath -Force
          
          Write-Host "Copied to: $destinationPath"
          
          # Verify
          if (Test-Path $destinationPath) {
            Write-Host "SUCCESS: Binary is ready at $destinationPath"
          } else {
            Write-Error "FAILED: Binary not found at $destinationPath"
            exit 1
          }

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Install Tauri dependencies
        working-directory: tauri
        shell: pwsh
        run: |
          npm install

      - name: Verify binary exists before build
        shell: pwsh
        run: |
          Write-Host "Files in tauri/bin/ before build:"
          Get-ChildItem tauri/bin/ | ForEach-Object { Write-Host $_.FullName }

      - name: Build Tauri App (Windows)
        working-directory: tauri
        run: npm run build

      - name: Upload Tauri Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: |
            tauri/target/release/bundle/msi/*.msi
            tauri/target/release/bundle/nsis/*.exe

  release:
    needs: [native-windows, tauri-windows]
#    needs: [native-linux, native-windows, tauri-linux, tauri-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Get current version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Update to next development version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))-SNAPSHOT"
          echo "Updating to next development version: $NEXT_VERSION"
          mvn version:set -DnewVersion=$NEXT_VERSION -q

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore: bump to next development version"
          git push

      - name: Create Git Tag
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
