name: Build Quarkus Native Image (Linux & Windows)

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  native-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: 25
          components: native-image
          cache: maven

      - name: Verify GraalVM
        run: |
          java -version
          native-image --version
          mvn -version

      - name: Build Quarkus Native Image (Linux, backend only)
        env:
          GRAALVM_HOME: ${{ env.JAVA_HOME }}
        run: |
          mvn clean package -Pnative -Dnative -DskipTests

      - name: Upload Native Binary runner
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-native-linux
          path: target/*-runner

  native-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: 25
          components: native-image
          cache: maven

      - name: Verify GraalVM
        run: |
          java -version
          native-image --version
          mvn -version

      - name: Build Quarkus Native Image (Windows, backend only)
        env:
          GRAALVM_HOME: ${{ env.JAVA_HOME }}
        run: |
          mvn clean package -Pnative -Dnative -DskipTests

      - name: Upload Native Binary runner
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-native-windows
          path: target/*-runner.exe

  electron-linux:
    needs: native-linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Download Quarkus Linux Binary
        uses: actions/download-artifact@v4
        with:
          name: quarkus-native-linux
          path: electron/bin/

      - name: Rename binary and set executable
        run: |
          mv electron/bin/*-runner electron/bin/pasa-auto-runner
          chmod +x electron/bin/pasa-auto-runner

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build Electron App (Linux)
        working-directory: electron
        run: npm run dist:linux

      - name: Upload Electron Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: |
            electron/dist/*.AppImage
            electron/dist/*.deb

  electron-windows:
    needs: native-windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Download Quarkus Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: quarkus-native-windows
          path: electron/bin/

      - name: Rename binary
        shell: pwsh
        run: |
          Get-ChildItem electron/bin/*-runner.exe | Rename-Item -NewName pasa-auto-runner.exe

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build Electron App (Windows)
        working-directory: electron
        run: npm run dist:win

      - name: Upload Electron Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: electron-windows
          path: |
            electron/dist/*.exe
